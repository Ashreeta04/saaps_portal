<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Path Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}">
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <!-- Back Button -->
    <button onclick="history.back()" class="back-button">← Back</button>

    <div class="container fade-in">
        <header>
            <h1>Career Path Prediction</h1>
            <p>Predict your ideal career path based on your skills and achievements!</p>
        </header>

        <div class="form-container slide-in">
            <h2>Upload Certificates or Select Skills</h2>

            <form id="prediction-form">
                <!-- File Upload Section -->
                <div class="upload-section">
                    <label for="certificate-upload" class="upload-label">Upload Certificates (PDF, JPEG, PNG)</label>
                    <input type="file" id="certificate-upload" name="certificate" accept=".pdf, .jpeg, .png" multiple>
                </div>

                <!-- OR Divider -->
                <div class="or-separator"><p>OR</p></div>

                <!-- Skill Checkboxes -->
                <div class="skills-selection">
                    <h3>Select Your Skills</h3>

                    <label><input type="checkbox" name="skills" value="HTML"> HTML</label>
                    <label><input type="checkbox" name="skills" value="CSS"> CSS</label>
                    <label><input type="checkbox" name="skills" value="Java"> Java</label>
                    <label><input type="checkbox" name="skills" value="SQL"> SQL</label>
                    <label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
                    <label><input type="checkbox" name="skills" value="React.js"> React.js</label>
                    <label><input type="checkbox" name="skills" value="AngularJS"> AngularJS</label>
                    <label><input type="checkbox" name="skills" value="Python"> Python</label>
                    <label><input type="checkbox" name="skills" value="PHP"> PHP</label>
                    <label><input type="checkbox" name="skills" value="Spring Boot"> Spring Boot</label>
                    <label><input type="checkbox" name="skills" value="Advanced Java"> Advanced Java</label>
                    <label><input type="checkbox" name="skills" value=".NET"> .NET</label>
                    <label><input type="checkbox" name="skills" value="AWS"> AWS</label>
                    <label><input type="checkbox" name="skills" value="Cloud Computing"> Cloud Computing</label>
                    <label><input type="checkbox" name="skills" value="DevOps"> DevOps</label>
                    <label><input type="checkbox" name="skills" value="Machine Learning"> Machine Learning</label>
                    <label><input type="checkbox" name="skills" value="Bootstrap"> Bootstrap</label>
                    <label><input type="checkbox" name="skills" value="C"> C</label>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn" id="predict-btn">Predict Career Path</button>
                </div>
            </form>
        </div>

        <div id="result-container" class="result-container">
            <h2>Your Predicted Career Path:</h2>
            <p id="career-path">Your prediction will appear here...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Career Path Predictor. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='Script.js') }}"></script>
    <script src="Script.js"></script>
</body>
</html>
